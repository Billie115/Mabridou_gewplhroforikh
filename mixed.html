<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Προσομοίωση Εξέτασης Γεωπληροφορική</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f766e, #14532d);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 950px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 42px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.2);
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    header p {
      color: #d1fae5;
      font-size: 18px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      color: #dcfce7;
      font-weight: bold;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 30px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: white;
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .quiz-card {
      background: white;
      color: #14532d;
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    }

    .question {
      font-size: 22px;
      font-weight: bold;
      line-height: 1.5;
      margin-bottom: 25px;
    }

    .answers {
      display: grid;
      gap: 15px;
      margin-bottom: 22px;
    }

    .answer-btn {
      width: 100%;
      border: 2px solid #d1d5db;
      border-radius: 16px;
      background: #e5e7eb;
      color: #1f2937;
      padding: 16px 18px;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border 0.2s ease;
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      background: #d1d5db;
      border-color: #9ca3af;
    }

    .answer-btn:disabled {
      cursor: not-allowed;
    }

    .answer-btn.correct {
      background: #dcfce7;
      border-color: #16a34a;
      color: #14532d;
    }

    .answer-btn.wrong {
      background: #fee2e2;
      border-color: #dc2626;
      color: #7f1d1d;
    }

    .feedback {
      display: none;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 24px;
      line-height: 1.55;
      font-size: 16px;
    }

    .feedback.correct-box {
      display: block;
      background: #dcfce7;
      border: 2px solid #16a34a;
      color: #14532d;
    }

    .feedback.wrong-box {
      display: block;
      background: #fee2e2;
      border: 2px solid #dc2626;
      color: #7f1d1d;
    }

    .feedback strong {
      display: block;
      margin-bottom: 7px;
      font-size: 18px;
    }

    .next-btn,
    .restart-btn {
      border: none;
      border-radius: 16px;
      background: #14532d;
      color: white;
      padding: 15px 28px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .next-btn:hover,
    .restart-btn:hover {
      background: #0f766e;
      transform: translateY(-4px);
    }

    .next-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .results {
      display: none;
      text-align: center;
    }

    .results h2 {
      font-size: 34px;
      margin-bottom: 14px;
      color: #14532d;
    }

    .score-text {
      font-size: 20px;
      margin-bottom: 26px;
      line-height: 1.6;
    }

    .result-bars {
      display: grid;
      gap: 18px;
      margin-bottom: 30px;
    }

    .result-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .result-bar {
      height: 18px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .correct-fill,
    .wrong-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    .correct-fill {
      background: #16a34a;
    }

    .wrong-fill {
      background: #dc2626;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #bbf7d0;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .container { padding: 25px; }
      header h1 { font-size: 30px; }
      .quiz-card { padding: 22px; }
      .question { font-size: 19px; }
    }
  </style>
</head>
<body>

  <main class="container">
    <header>
      <h1>Προσομοίωση Εξέτασης</h1>
      <p>20 τυχαίες ερωτήσεις από όλες τις ενότητες</p>
    </header>

    <div class="progress-info">
      <span id="questionCounter">Ερώτηση 1 / 20</span>
      <span id="progressPercent">0%</span>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <section class="quiz-card" id="quizCard">
      <div class="question" id="question">Φόρτωση ερωτήσεων...</div>
      <div class="answers" id="answers"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>
        Επόμενη Ερώτηση
      </button>
    </section>

    <section class="quiz-card results" id="scoreScreen">
      <h2>Αποτελέσματα</h2>
      <p class="score-text" id="finalScore"></p>

      <div class="result-bars">
        <div>
          <div class="result-label">
            <span>Σωστές απαντήσεις</span>
            <span id="correctPercentText">0%</span>
          </div>
          <div class="result-bar">
            <div class="correct-fill" id="correctFill"></div>
          </div>
        </div>
        <div>
          <div class="result-label">
            <span>Λάθος απαντήσεις</span>
            <span id="wrongPercentText">0%</span>
          </div>
          <div class="result-bar">
            <div class="wrong-fill" id="wrongFill"></div>
          </div>
        </div>
      </div>

      <button class="restart-btn" onclick="restartQuiz()">
        Επανεκκίνηση Quiz
      </button>
    </section>

    <footer>© 2026 Γεωπληροφορική</footer>
  </main>

  <script>
    async function loadAllQuestions() {
      const files = [
        "enothta1.html",
        "enothta2.html",
        "enothta3.html",
        "enothta4.html",
        "enothta5.html",
        "enothta6.html"
      ];

      let combinedQuestions = [];

      for (const file of files) {
        try {
          const response = await fetch(file);
          const text = await response.text();
          const match = text.match(/const questions = \[(.*?)\];/s);
          if (match) {
            const parsed = eval("[" + match[1] + "]");
            combinedQuestions.push(...parsed);
          }
        } catch (error) {
          console.error(`Error loading ${file}:`, error);
        }
      }

      shuffleArray(combinedQuestions);
      return combinedQuestions.slice(0, 20);
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    let questions = [];
    let currentQuestion = 0;
    let correctCount = 0;
    let wrongCount = 0;

    const questionEl    = document.getElementById("question");
    const answersEl     = document.getElementById("answers");
    const feedbackEl    = document.getElementById("feedback");
    const nextBtn       = document.getElementById("nextBtn");
    const progressFill  = document.getElementById("progressFill");
    const progressPct   = document.getElementById("progressPercent");
    const questionCounter = document.getElementById("questionCounter");

    loadAllQuestions().then(result => {
      questions = result;
      if (questions.length > 0) {
        loadQuestion();
      } else {
        questionEl.textContent = "Σφάλμα: Δεν βρέθηκαν ερωτήσεις. Βεβαιωθείτε ότι ανοίγετε τα αρχεία μέσω Local Server.";
      }
    });

    function loadQuestion() {
      resetState();

      const q = questions[currentQuestion];
      const letters = ["a", "b", "c", "d"];

      questionEl.textContent = `${currentQuestion + 1}. ${q.question}`;
      questionCounter.textContent = `Ερώτηση ${currentQuestion + 1} / ${questions.length}`;

      const percent = Math.round((currentQuestion / questions.length) * 100);
      progressFill.style.width = `${percent}%`;
      progressPct.textContent = `${percent}%`;

      nextBtn.textContent = currentQuestion === questions.length - 1
        ? "Τέλος Quiz"
        : "Επόμενη Ερώτηση";

      q.answers.forEach((answer, index) => {
        const button = document.createElement("button");
        button.textContent = `${letters[index]}. ${answer}`;
        button.classList.add("answer-btn");
        button.addEventListener("click", () => selectAnswer(index));
        answersEl.appendChild(button);
      });
    }

    function resetState() {
      nextBtn.disabled = true;
      feedbackEl.className = "feedback";
      feedbackEl.innerHTML = "";
      while (answersEl.firstChild) {
        answersEl.removeChild(answersEl.firstChild);
      }
    }

    function selectAnswer(index) {
      const q = questions[currentQuestion];
      const buttons = document.querySelectorAll(".answer-btn");
      const isCorrect = (index === q.correct);

      buttons.forEach(btn => btn.disabled = true);
      buttons.forEach((btn, i) => {
        if (i === q.correct) {
          btn.classList.add("correct");
        } else {
          btn.classList.add("wrong");
        }
      });

      if (isCorrect) {
        correctCount++;
      } else {
        wrongCount++;
      }

      feedbackEl.className = isCorrect ? "feedback correct-box" : "feedback wrong-box";
      feedbackEl.innerHTML = `
        <strong>${isCorrect ? "Σωστή απάντηση!" : "Λάθος απάντηση."}</strong>
        <p><b>Η σωστή απάντηση είναι:</b> ${q.answers[q.correct]}</p>
        <p><b>Γιατί:</b> ${q.explanation}</p>
      `;

      nextBtn.disabled = false;
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < questions.length) {
        loadQuestion();
      } else {
        showScore();
      }
    }

    function showScore() {
      document.getElementById("quizCard").style.display = "none";
      document.getElementById("scoreScreen").style.display = "block";

      progressFill.style.width = "100%";
      progressPct.textContent = "100%";

      const total = questions.length;
      const correctPercent = Math.round((correctCount / total) * 100);
      const wrongPercent = Math.round((wrongCount / total) * 100);

      document.getElementById("finalScore").innerHTML = `
        Σωστές: <strong>${correctCount}</strong><br>
        Λάθος: <strong>${wrongCount}</strong><br>
        Σύνολο ερωτήσεων: <strong>${total}</strong>
      `;

      document.getElementById("correctFill").style.width = `${correctPercent}%`;
      document.getElementById("wrongFill").style.width = `${wrongPercent}%`;
      document.getElementById("correctPercentText").textContent = `${correctPercent}%`;
      document.getElementById("wrongPercentText").textContent = `${wrongPercent}%`;
    }

    function restartQuiz() {
      location.reload();
    }
  </script>
</body>
</html>
