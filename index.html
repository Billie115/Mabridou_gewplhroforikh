<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Γεωπληροφορική - Main Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f766e, #14532d);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 45px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    header {
      text-align: center;
      margin-bottom: 45px;
    }

    header h1 {
      font-size: 42px;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    header p {
      font-size: 18px;
      color: #d1fae5;
    }

    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
    }

    .menu-button {
      min-height: 120px;
      border: none;
      border-radius: 18px;
      background: #ffffff;
      color: #14532d;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .menu-button:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.28);
      background: #dcfce7;
    }

    .menu-button span {
      display: block;
      font-size: 34px;
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: #bbf7d0;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 28px;
      }

      header h1 {
        font-size: 30px;
      }

      header p {
        font-size: 16px;
      }

      .menu-button {
        min-height: 100px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <header>
      <h1>Μάθημα Γεωπληροφορικής</h1>
      <p>Κεντρική σελίδα πλοήγησης</p>
    </header>

    <section class="buttons-grid">
      <button class="menu-button" onclick="window.location.href='enothta1.html'">
        <span></span>
        Ενότητα 1
      </button>

      <button class="menu-button" onclick="window.location.href='enothta2.html'">
        <span></span>
        Ενότητα 2
      </button>

      <button class="menu-button" onclick="window.location.href='enothta3.html'">
        <span></span>
        Ενότητα 3
      </button>

      <button class="menu-button" onclick="window.location.href='enothta4.html'">
        <span></span>
        Ενότητα 4
      </button>

      <button class="menu-button" onclick="window.location.href='enothta5.html'">
        <span></span>
        Ενότητα 5
      </button>

      <button class="menu-button" onclick="window.location.href='enothta6.html'">
        <span></span>
        Ενότητα 6
      </button>

      <button class="menu-button" onclick="window.location.href='enothta7.html'">
        <span></span>
        Ενότητα 7
      </button>
    </section>

    <footer>
      © 2026 Γεωπληροφορική
    </footer>
  </main>
</body>
</html>
